name: Carlisle Companies
description: >-
  Carlisle Companies Incorporated (NYSE: CSL) is a global diversified
  manufacturer of highly engineered building envelope products and
  solutions, serving commercial and residential construction,
  insulation, roofing, waterproofing, and specialty markets.
  Carlisle's primary operating segment is Carlisle Construction
  Materials (CCM), which includes brands such as Carlisle SynTec
  Systems, Hunter Panels, Henry Company, MB Technology, and WIP
  Industrial. Carlisle does not publish a public developer API;
  distributors and direct contractors transact through the Carlisle
  Customer Success Portal, and commercial trading partners integrate
  with Carlisle using standard X12 EDI transactions (850, 855, 856,
  810) over AS2/SFTP.
